<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Frontend Mentor | QR code component</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="qr-card">
      <figure>
        <img class="qr-code" src="./images/image-qr-code.png" alt="qr code" />
        <figcaption class="qr-info">
          <h1 class="qr-tag">
            Improve your front-end skills by building projects
          </h1>
          <p class="qr-description">
            Scan the QR coe to visit Frontend Mentor and take your coding skills
            to the next level
          </p>
        </figcaption>
      </figure>
    </main>

    <a href="../../index.html" class="home">
      <img src="../../assets/icons/home-icon.svg" alt="Back to Home" />
    </a>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by
      <a href="https://www.frontendmentor.io/profile/PearlBorromeo"
        >Pearl Borromeo</a
      >.
    </footer>
  </body>
</html>
