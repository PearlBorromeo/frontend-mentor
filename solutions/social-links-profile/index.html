<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Social links profile</title>

    <!--                    -->
    <!-- Google Font: Inter -->
    <!--                    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="wrapper">
      <section class="profile">
        <img class="picture" src="assets/images/avatar-pearl.png" alt="" />
        <h1 class="name">Pearl Borromeo</h1>
        <span class="location">Alberta, Canada </span>
        <p class="bio">"Endlessly curious"</p>
        <section class="links">
          <a
            href="https://github.com/PearlBorromeo"
            target="_blank"
            class="link"
          >
            GitHub
          </a>
          <a
            href="https://www.frontendmentor.io/profile/PearlBorromeo"
            target="_blank"
            class="link"
          >
            Frontend Mentor
          </a>
          <a
            href="https://www.linkedin.com/in/pearlborromeo/"
            target="_blank"
            class="link"
          >
            LinkedIn
          </a>
        </section>
      </section>
    </main>
    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
        >Frontend Mentor</a
      >. Coded by
      <a
        href="https://www.frontendmentor.io/profile/PearlBorromeo"
        target="_blank"
        >Pearl Borromeo</a
      >.
    </footer>
  </body>
</html>
